# ──────────────────────────────────────────────────────────────────────────────
# nasha – sample configuration
# Copy this file to config.yaml and adjust to your environment.
# ──────────────────────────────────────────────────────────────────────────────

server:
  # Address the HTTP server listens on.  Override with $NASHA_ADDR.
  addr: ":8080"
  # Path to the pre-built React bundle (relative to the binary).
  static_dir: "./web/dist"

auth:
  # Secret used to sign JWT tokens.  Must be changed in production!
  jwt_secret: "change-me-in-production"
  # Access token lifetime (e.g. 15m, 1h).
  token_ttl: "1h"

database:
  # SQLite database file path.  Use an absolute path in production.
  dsn: "./nasha.db"

cache:
  # Directory where thumbnails and other cached data are stored.
  dir: "./cache"

mounts:
  # ── Example: local filesystem ──────────────────────────────────────────────
  - name: "Local"
    type: local
    path: /local
    config:
      root: "/srv/files"

  # ── Example: SMB/CIFS share ────────────────────────────────────────────────
  # - name: "My NAS"
  #   type: smb
  #   path: /nas
  #   config:
  #     host: 192.168.1.100
  #     share: media
  #     username: admin
  #     password: secret
  #     domain: WORKGROUP

  # ── Example: S3-compatible object store ────────────────────────────────────
  # - name: "Cloud"
  #   type: s3
  #   path: /cloud
  #   config:
  #     endpoint: https://s3.amazonaws.com
  #     bucket: my-bucket
