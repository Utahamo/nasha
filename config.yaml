  #     secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
  #     path_style: false

  # ── Example: SFTP server ───────────────────────────────────────────────────
  # - name: "Remote SFTP"
  #   type: sftp
  #   path: /sftp
  #   config:
  #     host: sftp.example.com
  #     port: 22
  #     username: user
  #     password: secret
  #     # Or use a private key (PEM format, path relative to the binary):
  #     # private_key_file: ./id_rsa

  # ── Example: WebDAV remote ─────────────────────────────────────────────────
